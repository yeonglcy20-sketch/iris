<!doctype html><html lang="ko"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IRIS Header Sample</title>
<style>
body{margin:0;background:linear-gradient(135deg,#e6fffb,#fff,#c9f7f2);font-family:sans-serif}
.hero{max-width:1200px;margin:20px auto;padding:32px;border-radius:32px;background:rgba(255,255,255,.6);display:flex;justify-content:space-between;align-items:center}
.badge{display:inline-block;padding:8px 16px;border:1px solid #8fe7db;border-radius:999px;color:#5dbdb2;font-weight:700}
h1{font-size:56px;color:#fff;text-shadow:0 0 8px #79d9cc,0 3px 0 #7fded2}
.imageBox{width:190px;height:190px;border-radius:36px;background:linear-gradient(145deg,#fff,#d8faf6);display:grid;place-items:center;overflow:hidden;border:2px solid #9feee5}
.imageBox img{width:100%;height:100%;object-fit:contain}
</style></head><body>
<div class="hero">
<div>
<div class="badge">IRIS</div>
<h1>아이스리의 여우 기록소🦊</h1>
<p>민트 숲속에 남겨진 말랑한 발자국 기록</p>
</div>
<div class="imageBox">
<img src="fox_sd.png" alt="fox">
</div>
</div>
</body></html>
